<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Usuário</title>
    <link rel="stylesheet" href="../Frontend/Assets/CSS/excluirUsuario.css">
</head>
<body>

    <div class="formulario-painel">
        <div class="formulario-header">
            <h1>Excluir Usuário</h1>
        </div>

        <form class="formulario-corpo">
            
            <div class="campo-grupo">
                <label for="nomeUsuario">nomeUsuario</label>
                <input type="text" id="nomeUsuario" name="nomeUsuario" placeholder="Digite o usuário a ser excluído">
            </div>

            <div class="campo-grupo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha para confirmar">
            </div>

            <button type="submit" class="btn-excluir">Excluir</button>

            <div class="formulario-rodape">
                <a href="telaUsuarios.html" class="btn-cancelar">Cancelar</a>
            </div>

        </form>
    </div>

</body>
</html>
